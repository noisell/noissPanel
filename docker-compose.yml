services:

  panel:
    build: .
    restart: unless-stopped
    volumes:
      - panel_data:/app/data
    environment:
      - SERVER_IP=${DOMAIN}
      - PORT=443
      - LISTEN_PORT=8080
      - REGISTRATION=closed
      - ADMIN_LOGIN=${ADMIN_LOGIN:-admin}
      - ADMIN_PASS=${ADMIN_PASS}
      - BUILDER_BOT_TOKEN=${BUILDER_BOT_TOKEN:-}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/panel.conf:/etc/nginx/templates/panel.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN}
      - NGINX_ENVSUBST_TEMPLATE_DIR=/etc/nginx/templates
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    depends_on:
      - panel

volumes:
  panel_data:
